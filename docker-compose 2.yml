services:
  imperia-api:
    build: .
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      IMPERIA_CACHE_BACKEND: redis
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - imperia_data:/home/appuser/.tradingagents
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  imperia_data:
  redis_data:
